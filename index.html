<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>3D模型查看</title>
  <style>
    body { 
      margin: 0; 
      font-family: Arial, sans-serif;
    }
    model-viewer { 
      width: 100vw; 
      height: 50vh;
      display: block;
    }
    
    .image-gallery {
      width: 100vw;
      height: 50vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      box-sizing: border-box;
    }

    .image-gallery img {
      max-width: 300px;
      max-height: 300px;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 3px solid transparent;
    }

    .image-gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      border-color: #4285f4;
    }

    .image-modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      justify-content: center;
      align-items: center;
    }

    .image-modal.active {
      display: flex;
    }

    .image-modal img {
      max-width: 90%;
      max-height: 90%;
      width: auto;
      height: auto;
      border-radius: 8px;
      border: 4px solid #ffffff;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
    }

    .image-modal .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      color: #fff;
      font-size: 45px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
    }

    .image-modal .close-btn:hover {
      color: #4285f4;
      text-shadow: 0 0 15px rgba(66, 133, 244, 0.8);
    }
  </style>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

  <!-- 3D 模型会自动从网址加载 -->
  <model-viewer 
    id="modelViewer"
    camera-controls 
    auto-rotate 
    ar
    environment-image="neutral"
    shadow-intensity="1"
  ></model-viewer>
  
  <!-- 图片会自动从网址加载 -->
  <div class="image-gallery">
    <img id="showImage" src="" alt="插图" title="点击查看">
  </div>

  <div class="image-modal" id="imageModal">
    <span class="close-btn" id="closeBtn">&times;</span>
    <img src="" alt="全屏预览" id="modalImage">
  </div>

  <script>
    // ======================================
    // 核心：从网址自动加载 模型 + 图片
    // ======================================
    const params = new URLSearchParams(window.location.search);
    const modelName = params.get('model') || 'model.glb';  // 加载模型
    const imageName = params.get('img') || 'image1.jpg';   // 加载图片

    // 设置模型
    document.getElementById('modelViewer').src = './' + modelName;
    // 设置图片
    document.getElementById('showImage').src = './' + imageName;

    // 点击放大功能（保留你原来的）
    const modal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const closeBtn = document.getElementById('closeBtn');
    const galleryImages = document.querySelectorAll('.image-gallery img');

    galleryImages.forEach(img => {
      img.addEventListener('click', () => {
        modalImage.src = img.src;
        modal.classList.add('active');
      });
    });

    closeBtn.addEventListener('click', () => {
      modal.classList.remove('active');
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('active');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') modal.classList.remove('active');
    });
  </script>
</body>
</html>
