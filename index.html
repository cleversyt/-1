<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>简易3D查看</title>
  <style>
    body { margin: 0; }
    model-viewer { width: 100vw; height: 100vh; }
  </style>
  <!-- 引入 model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <!-- 直接写标签，路径对就能显示 -->
  <model-viewer 
    src="./model.glb" 
    camera-controls 
    auto-rotate 
    ar
    environment-image="neutral"
    shadow-intensity="1"
  ></model-viewer>
</body>
</html>
